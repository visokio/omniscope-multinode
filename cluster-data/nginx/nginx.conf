# ==============================================================================
# OpenResty (nginx + Lua) — Two roles:
#
# 1. KEYCLOAK PROXY (port 9900, server_name keycloak.localhost)
#    Proxies keycloak.localhost:9900 → keycloak:80 on the internal network.
#    Browsers resolve *.localhost natively (RFC 6761) — no /etc/hosts needed.
#    Containers reach Keycloak directly via service name "keycloak".
#    This gives Omniscope a single issuer URI (http://keycloak.localhost:9900)
#    that works from both the browser and inside containers.
#
# 2. VIEWER CLUSTER STICKY LOAD BALANCER (port 9091, catch-all)
#    Routes viewer traffic across 2 Omniscope nodes with true sticky sessions.
#
#    ROUTING STRATEGY (Lua-based):
#      On the very first request (no OMNI_ROUTE cookie), Lua picks a node
#      via round-robin and sets an OMNI_ROUTE=1|2 cookie in the response.
#      This cookie is set by nginx BEFORE Omniscope responds, so the browser
#      carries it on every subsequent request — including the /oidc-cb callback.
#
#      On all subsequent requests (OMNI_ROUTE cookie present), Lua reads the
#      cookie and routes directly to the pinned node. The OIDC flow always
#      lands on the same node that initiated it, so auth state always matches.
#
#    WHY OPENRESTY:
#      Stock nginx cannot set cookies on upstream responses without nginx Plus
#      (paid). OpenResty = nginx + Lua built-in, free, fully compatible with
#      all standard nginx config syntax.
#
# ==============================================================================

worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;
pid /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # Log includes upstream node so you can verify sticky routing is working
    log_format main '$remote_addr [$time_local] "$request" $status '
                    'upstream=$upstream_addr cookie_route=$cookie_OMNI_ROUTE rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 500M;

    # Shared counter for round-robin node selection on first request.
    # Stored in nginx shared memory — persists across worker processes.
    lua_shared_dict route_counter 1m;

    upstream viewer_node1 { server omniscope-viewer-1:9090; keepalive 8; }
    upstream viewer_node2 { server omniscope-viewer-2:9090; keepalive 8; }

    # ------------------------------------------------------------------
    # Keycloak proxy — keycloak.localhost:9900
    # Browsers resolve .localhost natively; containers use service name.
    # ------------------------------------------------------------------
    server {
        listen 9900;
        server_name keycloak.localhost;

        location / {
            proxy_pass http://keycloak:80;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }
    }

    # ------------------------------------------------------------------
    # Viewer cluster — OpenResty sticky session router (port 9091)
    # ------------------------------------------------------------------
    server {
        listen 9091;
        server_name _;

        location / {
            # ----------------------------------------------------------
            # Lua sticky routing
            #
            # Reads OMNI_ROUTE cookie to find the pinned node.
            # If no cookie: picks next node via round-robin, sets cookie.
            # The cookie is set on the response so the browser carries it
            # on ALL future requests including /oidc-cb callbacks.
            # ----------------------------------------------------------
            set $target_upstream "viewer_node1";

            rewrite_by_lua_block {
                local cookie = ngx.var.cookie_OMNI_ROUTE
                local node

                if cookie == "1" or cookie == "2" then
                    -- Cookie present: use pinned node
                    node = tonumber(cookie)
                else
                    -- No cookie: pick next node via round-robin, set cookie
                    local dict = ngx.shared.route_counter
                    local count = dict:incr("count", 1, 0)
                    node = (count % 2) + 1
                    ngx.header["Set-Cookie"] = "OMNI_ROUTE=" .. node
                        .. "; Path=/; SameSite=Lax; HttpOnly"
                end

                ngx.var.target_upstream = "viewer_node" .. node
            }

            proxy_pass http://$target_upstream;

            # Tell Omniscope its public address so it constructs redirect URIs correctly.
            # Without this, Omniscope sees itself on plain :80 and sends redirect URIs
            # like http://localhost/oidc-cb instead of http://localhost:9091/oidc-cb.
            proxy_set_header Host              "viewer.localhost:9091";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  "viewer.localhost:9091";
            proxy_set_header X-Forwarded-Port  "9091";

            # Expose which upstream node handled this request — visible in browser DevTools
            # Network tab → any request → Response Headers → X-Served-By
            add_header X-Served-By $upstream_addr always;

            # WebSocket support (required for Omniscope live updates)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout  30s;
            proxy_send_timeout     60s;
            proxy_read_timeout    300s;   # long timeout for workflow executions

            proxy_buffering on;
            proxy_buffer_size       16k;
            proxy_buffers           8 16k;
            proxy_busy_buffers_size 32k;
        }

        # Internal health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
